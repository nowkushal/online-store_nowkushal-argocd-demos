apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tls-proxy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nowkushal/online-store_nowkushal-argocd-demos.git
    targetRevision: main
    path: tls-proxy
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
