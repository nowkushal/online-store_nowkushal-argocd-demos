apiVersion: apps/v1
kind: Deployment
metadata:
  name: tls-proxy
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: tls-proxy
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: '2026-07-02T20:01:01+08:00'
      labels:
        app: tls-proxy
    spec:
      containers:
      - image: nginx:alpine
        imagePullPolicy: IfNotPresent
        name: nginx
        ports:
        - containerPort: 8080
          protocol: TCP
        - containerPort: 8083
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/nginx/nginx.conf
          name: config
          subPath: nginx.conf
        - mountPath: /var/run/secrets/tls
          name: tls-certs
      dnsPolicy: ClusterFirst
      initContainers:
      - args:
        - "apk add --no-cache openssl\nopenssl req -x509 -nodes -days 365 -newkey\
          \ rsa:2048 \\\n  -keyout /var/run/secrets/tls/tls.key \\\n  -out /var/run/secrets/tls/tls.crt\
          \ \\\n  -subj \"/CN=localhost\"\n"
        command:
        - /bin/sh
        - -c
        image: alpine:latest
        imagePullPolicy: Always
        name: init-certs
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/run/secrets/tls
          name: tls-certs
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: tls-proxy-config
        name: config
      - emptyDir: {}
        name: tls-certs
