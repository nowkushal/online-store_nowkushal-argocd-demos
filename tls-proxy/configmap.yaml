apiVersion: v1
data:
  nginx.conf: |
    events {}
    http {
        server {
            listen 8080 ssl;
            ssl_certificate /var/run/secrets/tls/tls.crt;
            ssl_certificate_key /var/run/secrets/tls/tls.key;

            location / {
                proxy_pass http://vote:5000;
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
            }
        }

        server {
            listen 8083 ssl;
            ssl_certificate /var/run/secrets/tls/tls.crt;
            ssl_certificate_key /var/run/secrets/tls/tls.key;

            location / {
                proxy_pass http://result:5001;
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
            }
        }

        server {
            listen 8084 ssl;
            ssl_certificate /var/run/secrets/tls/tls.crt;
            ssl_certificate_key /var/run/secrets/tls/tls.key;

            location / {
                proxy_pass http://online-shop-service:3000;
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
            }
        }
    }

kind: ConfigMap
metadata:
  name: tls-proxy-config
  namespace: default
